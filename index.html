<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พิมพ์สถิติการมาเรียนนักเรียน</title>
    
    <!-- ฟอนต์ Sarabun -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                    },
                    colors: {
                        schoolRed: '#D32F2F',
                        schoolYellow: '#FBC02D',
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f9fafb;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            body {
                background-color: white;
            }
            .print-border {
                border: 1px solid #000 !important;
            }
            .print-border th, .print-border td {
                border: 1px solid #000 !important;
                color: black !important;
            }
            .page-break-before {
                page-break-before: always;
            }
        }
        
        /* Custom Scrollbar for table */
        .table-container::-webkit-scrollbar {
            height: 8px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // URL ของ Google Apps Script ที่คุณให้มา
        // หากเปลี่ยน URL ใหม่จากการ Deploy อย่าลืมนำมาเปลี่ยนตรงนี้
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyHOsBAAX74AUYeX6U3N7MigdF6UeJQ8d5XsOK7jRjrag6GDBAeActCwbOHhfMQ9yt4/exec";

        function App() {
            const [selectedDate, setSelectedDate] = React.useState(new Date().toISOString().split('T')[0]);
            const [loading, setLoading] = React.useState(false);
            const [saving, setSaving] = React.useState(false);
            const [reportData, setReportData] = React.useState([]);
            const [summaryData, setSummaryData] = React.useState({ boys: 0, girls: 0, total: 0, present: 0, absent: 0 });
            const [settings, setSettings] = React.useState({
                teacher1: '',
                teacher2: '',
                topic: ''
            });
            const [message, setMessage] = React.useState({ type: '', text: '', showHelp: false });

            // ดึงข้อมูลเมื่อเปลี่ยนวันที่
            React.useEffect(() => {
                fetchData(selectedDate);
            }, [selectedDate]);

            const fetchData = async (date) => {
                setLoading(true);
                setMessage({ type: '', text: '', showHelp: false });
                try {
                    // การส่งคำขอไปที่ GAS แนะนำให้ส่งเป็นแบบ Simple request เพื่อหลีกเลี่ยง CORS Preflight
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        // ลบ headers ออกเนื่องจากเบราว์เซอร์จะตั้งค่าให้อัตโนมัติและไม่เรียก OPTIONS preflight
                        body: JSON.stringify({ action: 'getData', date: date })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        setReportData(result.data.report);
                        
                        // คำนวณผลรวม
                        let sBoys = 0, sGirls = 0, sTotal = 0, sPresent = 0, sAbsent = 0;
                        result.data.report.forEach(row => {
                            sBoys += row.totalBoys;
                            sGirls += row.totalGirls;
                            sTotal += row.total;
                            sPresent += row.present;
                            sAbsent += row.absent;
                        });
                        setSummaryData({ boys: sBoys, girls: sGirls, total: sTotal, present: sPresent, absent: sAbsent });
                        
                        setSettings({
                            teacher1: result.data.settings.teacher1 || '',
                            teacher2: result.data.settings.teacher2 || '',
                            topic: result.data.settings.topic || ''
                        });
                    } else {
                        throw new Error(result.error || 'เกิดข้อผิดพลาดในการดึงข้อมูล');
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                    // ตรวจสอบว่าเป็น Failed to fetch หรือไม่ เพื่อแสดงคำแนะนำที่ตรงจุด
                    const isFetchError = error.message.includes('Failed to fetch') || error.message.includes('NetworkError');
                    setMessage({ 
                        type: 'error', 
                        text: 'ไม่สามารถโหลดข้อมูลได้ ' + (isFetchError ? '(เชื่อมต่อเซิร์ฟเวอร์ไม่ได้)' : `(${error.message})`),
                        showHelp: isFetchError 
                    });
                    setReportData([]);
                } finally {
                    setLoading(false);
                }
            };

            const handleSave = async () => {
                if (!settings.teacher1 && !settings.teacher2 && !settings.topic) {
                    setMessage({ type: 'error', text: 'กรุณากรอกข้อมูลอย่างน้อย 1 ช่องก่อนบันทึก', showHelp: false });
                    return;
                }

                setSaving(true);
                setMessage({ type: '', text: '', showHelp: false });
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'saveSettings', 
                            date: selectedDate,
                            teacher1: settings.teacher1,
                            teacher2: settings.teacher2,
                            topic: settings.topic
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        setMessage({ type: 'success', text: 'บันทึกข้อมูลการอบรมและครูเวรเรียบร้อยแล้ว', showHelp: false });
                        setTimeout(() => setMessage({ type: '', text: '', showHelp: false }), 3000);
                    } else {
                        throw new Error(result.error || 'เกิดข้อผิดพลาดในการบันทึกข้อมูล');
                    }
                } catch (error) {
                    console.error("Error saving data:", error);
                    const isFetchError = error.message.includes('Failed to fetch') || error.message.includes('NetworkError');
                    setMessage({ 
                        type: 'error', 
                        text: 'ไม่สามารถบันทึกข้อมูลได้ ' + (isFetchError ? '(เชื่อมต่อเซิร์ฟเวอร์ไม่ได้)' : `(${error.message})`),
                        showHelp: isFetchError 
                    });
                } finally {
                    setSaving(false);
                }
            };

            const handlePrint = () => {
                window.print();
            };

            const formatDateThai = (dateString) => {
                if (!dateString) return '';
                const date = new Date(dateString);
                const months = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
                return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header (No Print) */}
                    <div className="bg-gradient-to-r from-schoolRed to-schoolYellow p-6 shadow-md no-print">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center">
                            <div className="flex items-center space-x-4 mb-4 md:mb-0">
                                <div className="bg-white p-2 rounded-full">
                                    <svg className="w-8 h-8 text-schoolRed" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-white tracking-wide">ระบบพิมพ์สถิติการมาเรียนนักเรียน</h1>
                                    <p className="text-red-100 text-sm">อ้างอิงข้อมูลจาก Google Sheets</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-3 bg-white/20 p-2 rounded-lg backdrop-blur-sm">
                                <label className="text-white font-medium pl-2">เลือกวันที่:</label>
                                <input 
                                    type="date" 
                                    value={selectedDate} 
                                    onChange={(e) => setSelectedDate(e.target.value)}
                                    className="px-3 py-2 rounded border border-white/50 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-300"
                                />
                                <button 
                                    onClick={handlePrint}
                                    className="flex items-center space-x-1 bg-white text-schoolRed hover:bg-yellow-50 px-4 py-2 rounded font-semibold transition-colors shadow-sm"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                    <span>พิมพ์รายงาน</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-5xl mx-auto mt-8 px-4">
                        
                        {/* Error Help Message (No Print) */}
                        {message.text && message.type === 'error' && (
                            <div className="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded shadow-sm no-print">
                                <div className="flex">
                                    <div className="flex-shrink-0">
                                        <svg className="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" />
                                        </svg>
                                    </div>
                                    <div className="ml-3">
                                        <h3 className="text-sm font-medium text-red-800">{message.text}</h3>
                                        {message.showHelp && (
                                            <div className="mt-2 text-sm text-red-700">
                                                <p className="font-bold mb-1">คำแนะนำในการแก้ไข (Google Apps Script):</p>
                                                <ul className="list-disc pl-5 space-y-1">
                                                    <li>ตรวจสอบการตั้งค่า Deploy เป็น Web App อีกครั้ง</li>
                                                    <li>ช่อง <b>Execute as</b> ต้องเลือกเป็น <b>"Me"</b></li>
                                                    <li>ช่อง <b>Who has access</b> ต้องเลือกเป็น <b>"Anyone" (ทุกคน)</b></li>
                                                    <li>หากมีการแก้ไขโค้ดที่ Apps Script ต้องกด <b>Deploy &gt; New deployment</b> เสมอ (ห้ามใช้ Manage deployment เดิม)</li>
                                                    <li>นำ URL ใหม่ที่ได้มาอัปเดตในตัวแปร <code className="bg-red-100 px-1 rounded">GAS_URL</code> ของเว็บแอป</li>
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Print Header (Only visible when printing) */}
                        <div className="hidden print-only text-center mb-6">
                            <h2 className="text-2xl font-bold text-black mb-2">รายงานสถิติการมาเรียนนักเรียนประจำวัน</h2>
                            <p className="text-lg text-black">ประจำวันที่ {formatDateThai(selectedDate)}</p>
                        </div>

                        {/* Loading State */}
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-20 no-print">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-schoolRed"></div>
                                <p className="mt-4 text-gray-600 font-medium animate-pulse">กำลังโหลดข้อมูล...</p>
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl shadow-lg p-6 print-border">
                                
                                {/* Table Title */}
                                <h2 className="text-xl font-bold text-gray-800 mb-4 border-l-4 border-schoolRed pl-3 no-print">
                                    ข้อมูลประจำวันที่ {formatDateThai(selectedDate)}
                                </h2>

                                {/* Table */}
                                <div className="overflow-x-auto table-container">
                                    <table className="w-full text-left border-collapse print-border">
                                        <thead>
                                            <tr className="bg-yellow-50 text-gray-700 print:bg-gray-100">
                                                <th className="border p-3 font-semibold text-center w-16">ชั้น</th>
                                                <th className="border p-3 font-semibold text-center">ช</th>
                                                <th className="border p-3 font-semibold text-center">ญ</th>
                                                <th className="border p-3 font-semibold text-center">รวม</th>
                                                <th className="border p-3 font-semibold text-center text-green-600 print:text-black">มา</th>
                                                <th className="border p-3 font-semibold text-center text-red-600 print:text-black">ไม่มา</th>
                                                <th className="border p-3 font-semibold min-w-[250px]">ชื่อนักเรียนที่ไม่ได้มา (สาเหตุ)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {reportData.length > 0 ? (
                                                reportData.map((row, index) => (
                                                    <tr key={index} className="hover:bg-gray-50 transition-colors">
                                                        <td className="border p-3 text-center font-medium">{row.class}</td>
                                                        <td className="border p-3 text-center">{row.totalBoys}</td>
                                                        <td className="border p-3 text-center">{row.totalGirls}</td>
                                                        <td className="border p-3 text-center font-bold">{row.total}</td>
                                                        <td className="border p-3 text-center text-green-600 print:text-black font-semibold">{row.present}</td>
                                                        <td className="border p-3 text-center text-red-600 print:text-black font-semibold">{row.absent}</td>
                                                        <td className="border p-3 text-sm">
                                                            {row.absentees.length > 0 ? (
                                                                <ul className="list-disc list-inside text-red-600 print:text-black">
                                                                    {row.absentees.map((name, i) => (
                                                                        <li key={i}>{name}</li>
                                                                    ))}
                                                                </ul>
                                                            ) : (
                                                                <span className="text-gray-400 italic print:text-black">-</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))
                                            ) : (
                                                <tr>
                                                    <td colSpan="7" className="border p-8 text-center text-gray-500">
                                                        ไม่มีข้อมูลนักเรียน กรุณาตรวจสอบฐานข้อมูลใน Google Sheet หรือเชื่อมต่อให้ถูกต้อง
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                        {/* Summary Footer */}
                                        {reportData.length > 0 && (
                                            <tfoot>
                                                <tr className="bg-red-50 font-bold text-gray-800 print:bg-gray-200">
                                                    <td className="border p-3 text-center">รวม</td>
                                                    <td className="border p-3 text-center">{summaryData.boys}</td>
                                                    <td className="border p-3 text-center">{summaryData.girls}</td>
                                                    <td className="border p-3 text-center">{summaryData.total}</td>
                                                    <td className="border p-3 text-center text-green-700 print:text-black">{summaryData.present}</td>
                                                    <td className="border p-3 text-center text-red-700 print:text-black">{summaryData.absent}</td>
                                                    <td className="border p-3"></td>
                                                </tr>
                                            </tfoot>
                                        )}
                                    </table>
                                </div>

                                {/* Form Section / Print Signatures */}
                                <div className="mt-8 pt-6 border-t border-gray-200">
                                    
                                    {/* Print Mode Signatures */}
                                    <div className="hidden print-only mt-10">
                                        <div className="mb-6 border p-4">
                                            <p className="font-bold">หัวข้อการอบรมนักเรียนประจำวัน:</p>
                                            <p className="mt-2 min-h-[60px] whitespace-pre-wrap">{settings.topic || '-'}</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-y-16 mt-12">
                                            <div className="text-center">
                                                <p className="mb-8">ลงชื่อ..............................................................</p>
                                                <p>({settings.teacher1 || '................................................'})</p>
                                                <p>ครูเวรประจำวัน</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="mb-8">ลงชื่อ..............................................................</p>
                                                <p>({settings.teacher2 || '................................................'})</p>
                                                <p>ครูเวรประจำวัน</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="mb-8">ลงชื่อ..............................................................</p>
                                                <p>(นายจักรพงศ์ จันทวงศ์)</p>
                                                <p>รองผู้อำนวยการโรงเรียนวัดแม่กะ</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="mb-8">ลงชื่อ..............................................................</p>
                                                <p>(นางสาวศิริยา อินทกาโมทย์)</p>
                                                <p>ผู้อำนวยการโรงเรียนวัดแม่กะ</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Web Mode Form */}
                                    <div className="no-print">
                                        <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                                            <svg className="w-5 h-5 mr-2 text-schoolYellow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                            บันทึกข้อมูลครูเวรและการอบรม
                                        </h3>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">ครูเวรคนที่ 1</label>
                                                <input 
                                                    type="text" 
                                                    value={settings.teacher1}
                                                    onChange={(e) => setSettings({...settings, teacher1: e.target.value})}
                                                    placeholder="ชื่อ-สกุล ครูเวรคนที่ 1"
                                                    className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-schoolRed focus:border-transparent"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">ครูเวรคนที่ 2</label>
                                                <input 
                                                    type="text" 
                                                    value={settings.teacher2}
                                                    onChange={(e) => setSettings({...settings, teacher2: e.target.value})}
                                                    placeholder="ชื่อ-สกุล ครูเวรคนที่ 2"
                                                    className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-schoolRed focus:border-transparent"
                                                />
                                            </div>
                                        </div>
                                        
                                        <div className="mb-4">
                                            <label className="block text-sm font-medium text-gray-700 mb-1">การอบรมนักเรียนประจำวัน</label>
                                            <textarea 
                                                value={settings.topic}
                                                onChange={(e) => setSettings({...settings, topic: e.target.value})}
                                                placeholder="ระบุหัวข้อการอบรม..."
                                                rows="3"
                                                className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-schoolRed focus:border-transparent"
                                            ></textarea>
                                        </div>

                                        <div className="flex items-center justify-between">
                                            <button 
                                                onClick={handleSave}
                                                disabled={saving}
                                                className={`flex items-center px-6 py-2 rounded text-white font-semibold transition-all shadow-md
                                                    ${saving ? 'bg-gray-400 cursor-not-allowed' : 'bg-schoolRed hover:bg-red-700'}`}
                                            >
                                                {saving ? (
                                                    <><div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></div> กำลังบันทึก...</>
                                                ) : (
                                                    <><svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg> บันทึกข้อมูล</>
                                                )}
                                            </button>

                                            {message.text && message.type === 'success' && (
                                                <div className="px-4 py-2 rounded text-sm font-medium flex items-center bg-green-100 text-green-700">
                                                    {message.text}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
